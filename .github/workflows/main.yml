name: Update signals

on:
  workflow_dispatch:
  schedule:
    - cron: "5 1 * * 1-5"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run script
        run: |
          python cloud_update/generate_signals_cloud.py

      - name: Commit changes
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add data/latest_signals.json
          git commit -m "update signals" || echo "no changes"
          git push
