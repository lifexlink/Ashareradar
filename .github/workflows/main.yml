name: Update signals

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1-5"
    - cron: "0 5 * * 1-5"
    - cron: "0 7 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        run: |
          python cloud_update/generate_signals_cloud.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_signals.json data/history/*.json
          git diff --cached --quiet || git commit -m "update signals"
          git push
