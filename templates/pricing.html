{% extends "layout.html" %}{% block body %}<h2>会员套餐</h2><div class="grid three">{% for key, plan in plans.items() %}<div class="card"><h3>{{ plan.name }}</h3><p class="price">{{ plan.price }}</p><p>解锁完整 Top10、完整理由和后续升级功能。</p>{% if session.get('user') %}<a class="btn primary" href="{{ url_for('pay', plan_code=key) }}">立即开通</a>{% else %}<a class="btn primary" href="{{ url_for('login') }}">先登录后开通</a>{% endif %}</div>{% endfor %}</div>{% endblock %}
