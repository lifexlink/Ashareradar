{% extends "layout.html" %}{% block body %}<h2>{{ plan.name }}开通</h2><div class="grid two"><div class="card"><p class="price">{{ plan.price }}</p><p>先扫码付款，再提交付款备注。你在后台核对后即可开通。</p><div class="qr-wrap"><div><h4>微信收款码</h4><img class="qr" src="{{ url_for('static', filename='wechat_qr_placeholder.svg') }}" alt="wechat qr"></div><div><h4>支付宝收款码</h4><img class="qr" src="{{ url_for('static', filename='alipay_qr_placeholder.svg') }}" alt="alipay qr"></div></div></div><div class="card"><form method="post" class="form"><label>付款人昵称<input name="payer_name" placeholder="便于你核对到账"></label><label>付款备注<input name="payer_note" placeholder="如：尾号/金额/时间"></label><button class="btn primary" type="submit">我已付款，提交开通申请</button></form><p class="muted">后续你可以把这一步升级成自动支付回调。</p></div></div>{% endblock %}
