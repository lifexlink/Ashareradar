{% extends "layout.html" %}{% block body %}
<div class="auth-card">
  <h2>修改管理员密码</h2>
  <p class="muted">当前管理员：{{ user.username }}</p>

  <form method="post" class="form">
    <label>原密码
      <input name="old_password" type="password" required>
    </label>

    <label>新密码
      <input name="new_password" type="password" required placeholder="至少8位，建议包含大小写和数字">
    </label>

    <label>确认新密码
      <input name="confirm_password" type="password" required>
    </label>

    <button class="btn primary" type="submit">确认修改密码</button>
  </form>

  <p class="muted">修改成功后会自动退出，请使用新密码重新登录后台。</p>
</div>
{% endblock %}
